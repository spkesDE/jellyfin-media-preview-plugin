[changelog]
header = ""
body = """
{% set features = commits | filter(attribute="group", value="Features") -%}
{% set fixes = commits | filter(attribute="group", value="Fixes") -%}
{% set builds = commits | filter(attribute="group", value="Build") -%}
{% set docs = commits | filter(attribute="group", value="Documentation") -%}
{% set refactors = commits | filter(attribute="group", value="Refactoring") -%}
{% set other = commits | filter(attribute="group", value="Other") -%}
{% for commit in features -%}
- {{ commit.message }}
{% endfor -%}
{% for commit in fixes -%}
- {{ commit.message }}
{% endfor -%}
{% for commit in builds -%}
- {{ commit.message }}
{% endfor -%}
{% for commit in docs -%}
- {{ commit.message }}
{% endfor -%}
{% for commit in refactors -%}
- {{ commit.message }}
{% endfor -%}
{% for commit in other -%}
- {{ commit.message }}
{% endfor -%}
"""
trim = true
footer = ""

[git]
conventional_commits = false
filter_unconventional = false
split_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[[git.commit_parsers]]
message = "^Prepare release .*"
skip = true

[[git.commit_parsers]]
message = "^Update changelog and manifest for v.*"
skip = true

[[git.commit_parsers]]
message = "^Merge branch .*"
skip = true

[[git.commit_parsers]]
message = "^Merge pull request .*"
skip = true

[[git.commit_parsers]]
message = "^ci"
skip = true

[[git.commit_parsers]]
message = "^feat"
group = "Features"

[[git.commit_parsers]]
message = "^fix"
group = "Fixes"

[[git.commit_parsers]]
message = "^build"
group = "Build"

[[git.commit_parsers]]
message = "^docs"
group = "Documentation"

[[git.commit_parsers]]
message = "^refactor"
group = "Refactoring"

[[git.commit_parsers]]
message = ".*"
group = "Other"
