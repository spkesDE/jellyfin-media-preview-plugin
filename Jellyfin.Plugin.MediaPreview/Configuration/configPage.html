<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Media Preview</title>
</head>
<body>
    <div id="MediaPreviewConfigPage" data-role="page" class="page type-interior pluginConfigurationPage">
        <div data-role="content">
            <div id="MediaPreviewConfigApp"></div>
        </div>

        <script type="text/javascript">
            (function () {
                const apiClient = window.ApiClient || window.apiClient;
                const scriptUrl = apiClient && typeof apiClient.getUrl === 'function'
                    ? apiClient.getUrl('media-preview/config-script')
                    : new URL('media-preview/config-script', window.location.origin + '/').toString();

                if (!scriptUrl) {
                    throw new Error('Could not resolve the Media Preview configuration bundle URL.');
                }

                const script = document.createElement('script');
                script.src = scriptUrl;
                script.async = true;
                document.head.appendChild(script);
            }());
        </script>
    </div>
</body>
</html>
